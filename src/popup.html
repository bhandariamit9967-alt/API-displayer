<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FigmaRoast</title>
    <link rel="stylesheet" href="popup.css" />
</head>

<body>
    <div class="app">

        <header class="header">
            <div class="header-left">
                <div class="logo-mark">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <rect width="28" height="28" rx="8" fill="#FF4D4D" />
                        <text x="14" y="20" text-anchor="middle" font-size="16" fill="white">💬</text>
                    </svg>
                </div>
                <div>
                    <div class="app-title">FigmaRoast</div>
                    <div class="app-subtitle">Fake Client Feedback Generator</div>
                </div>
            </div>
            <div class="status-badge" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
            </div>
        </header>


        <div class="stats-bar">
            <div class="stat">
                <span class="stat-num" id="totalCount">0</span>
                <span class="stat-label">Generated</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
                <span class="stat-num" id="openCount">0</span>
                <span class="stat-label">Open</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
                <span class="stat-num" id="resolvedCount">0</span>
                <span class="stat-label">Resolved</span>
            </div>
        </div>


        <div class="section">
            <div class="section-label">FEEDBACK CATEGORIES</div>
            <div class="categories-grid" id="categoriesGrid">
                <label class="cat-chip active" data-cat="logo">
                    <input type="checkbox" checked value="logo" />
                    <span>🔴 Logo Size</span>
                </label>
                <label class="cat-chip active" data-cat="color">
                    <input type="checkbox" checked value="color" />
                    <span>🎨 Color</span>
                </label>
                <label class="cat-chip active" data-cat="copy">
                    <input type="checkbox" checked value="copy" />
                    <span>✍️ Copy</span>
                </label>
                <label class="cat-chip active" data-cat="layout">
                    <input type="checkbox" checked value="layout" />
                    <span>📐 Layout</span>
                </label>
                <label class="cat-chip active" data-cat="whitespace">
                    <input type="checkbox" checked value="whitespace" />
                    <span>⬜ Whitespace</span>
                </label>
                <label class="cat-chip active" data-cat="branding">
                    <input type="checkbox" checked value="branding" />
                    <span>💎 Branding</span>
                </label>
                <label class="cat-chip active" data-cat="nephew">
                    <input type="checkbox" checked value="nephew" />
                    <span>👦 My Nephew</span>
                </label>
                <label class="cat-chip active" data-cat="competitor">
                    <input type="checkbox" checked value="competitor" />
                    <span>🏆 Competitors</span>
                </label>
                <label class="cat-chip active" data-cat="scope">
                    <input type="checkbox" checked value="scope" />
                    <span>🚨 Scope Creep</span>
                </label>
                <label class="cat-chip active" data-cat="font">
                    <input type="checkbox" checked value="font" />
                    <span>🔤 Fonts</span>
                </label>
                <label class="cat-chip active" data-cat="mobile">
                    <input type="checkbox" checked value="mobile" />
                    <span>📱 Mobile</span>
                </label>
                <label class="cat-chip active" data-cat="vibe">
                    <input type="checkbox" checked value="vibe" />
                    <span>✨ Vibes</span>
                </label>
            </div>
        </div>


        <div class="section">
            <div class="section-label">NUMBER OF COMMENTS</div>
            <div class="count-row">
                <div class="count-presets">
                    <button class="count-btn active" data-count="5">5</button>
                    <button class="count-btn" data-count="10">10</button>
                    <button class="count-btn" data-count="15">15</button>
                    <button class="count-btn" data-count="20">20</button>
                </div>
                <div class="count-custom">
                    <input type="number" id="customCount" min="1" max="50" placeholder="Custom" />
                </div>
            </div>
        </div>


        <div class="section">
            <div class="section-label">SEVERITY DISTRIBUTION</div>
            <div class="severity-row">
                <div class="severity-item">
                    <div class="sev-header">
                        <span class="sev-badge nitpick">Nitpick</span>
                        <span class="sev-pct" id="nitpickPct">40%</span>
                    </div>
                    <input type="range" class="sev-slider" id="nitpickSlider" min="0" max="100" value="40" />
                </div>
                <div class="severity-item">
                    <div class="sev-header">
                        <span class="sev-badge change">Change Req</span>
                        <span class="sev-pct" id="changePct">40%</span>
                    </div>
                    <input type="range" class="sev-slider" id="changeSlider" min="0" max="100" value="40" />
                </div>
                <div class="severity-item">
                    <div class="sev-header">
                        <span class="sev-badge panic">PANIC</span>
                        <span class="sev-pct" id="panicPct">20%</span>
                    </div>
                    <input type="range" class="sev-slider" id="panicSlider" min="0" max="100" value="20" />
                </div>
            </div>
        </div>


        <div class="section">
            <button class="generate-btn" id="generateBtn">
                <span class="btn-icon">🎭</span>
                <span class="btn-text">Generate Client Feedback</span>
                <span class="btn-sub">Inject chaos into your canvas</span>
            </button>
        </div>


        <div class="section" id="commentsSection" style="display:none">
            <div class="section-header">
                <div class="section-label">ACTIVE FEEDBACK</div>
                <div class="header-actions">
                    <button class="text-btn" id="resolveAllBtn">Resolve All</button>
                    <button class="text-btn danger" id="clearAllBtn">Clear All</button>
                </div>
            </div>
            <div class="comments-list" id="commentsList"></div>
        </div>


        <footer class="footer">
            <span>Made to survive client calls 🫡</span>
        </footer>
    </div>

</body>
<script src="popup.js"></script>

</html>
